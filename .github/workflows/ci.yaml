name: CI-CD

on:
  push:

jobs:
  precommit:
    name: Pre-Commit
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-nix-registry-nix-store-cache
      - nscloud-git-mirror-1gb
    steps:
      # Setup
      - uses: AtomiCloud/actions.setup-nix@v3
      # pre commit
      - name: Run pre-commit
        run: nix develop .#ci -c ./scripts/ci/pre-commit.sh

  build:
    name: Nix Build
    strategy:
      # Per-arch caches are independent, so one arch failing/cold-building
      # should not cancel the others.
      fail-fast: false
      matrix:
        # Each architecture gets its OWN cache tag. amd64 and arm64 previously
        # shared one tag (nix-registry-nix-build-store-cache); since both jobs
        # mount and persist the same Namespace volume concurrently, the slower
        # job's store would overwrite the faster one's, so the two arches kept
        # clobbering each other's cache (one warm, the other cold every run).
        #
        # Linux runners are 8x16 (16GB): on a cold cache the heavy rust
        # workspaces (worktrunk, attic) are built from source, and a
        # single one needs more than the old 4x8 (8GB) runner had.
        platform:
          - name: Linux x86_64
            os:
              - nscloud-ubuntu-22.04-amd64-8x16-with-cache
              - nscloud-cache-size-50gb
              - nscloud-cache-tag-nix-registry-nix-build-store-cache-amd64
              - nscloud-git-mirror-1gb
          - name: Linux aarch64
            os:
              - nscloud-ubuntu-22.04-arm64-8x16-with-cache
              - nscloud-cache-size-50gb
              - nscloud-cache-tag-nix-registry-nix-build-store-cache-arm64
              - nscloud-git-mirror-1gb
          - name: MacOS aarch64
            os:
              - nscloud-macos-sequoia-arm64-6x14-with-cache
              - nscloud-cache-size-50gb
              - nscloud-cache-tag-nix-registry-nix-build-store-cache-macos-arm64
              - nscloud-git-mirror-1gb
    runs-on: ${{ matrix.platform.os }}
    steps:
      # Setup
      - uses: AtomiCloud/actions.setup-nix@v3

      # The per-arch caches start cold on first run, so the heavy rust
      # workspaces (worktrunk, attic) are compiled from source.
      # --max-jobs 1 serialises derivations so only one of those links at a
      # time, keeping peak memory within the 16GB runner. Once the Namespace
      # /nix cache is warm this run is ~1 min regardless.
      - name: Nix Build
        run: >-
          nix shell --max-jobs 1 --cores 2 nixpkgs#bash
          .#sg
          .#upstash
          .#action_docs
          .#typescript_json_schema
          .#swagger_typescript_api
          .#dotnetsay
          .#dotnet-ef
          .#mirrord
          .#pls
          .#toml-cli
          .#nix-share
          .#aws-export-credentials
          .#cyanprint
          .#worktrunk
          .#atomiutils
          .#gardenio
          .#infrautils
          .#infralint
          .#codecov
          .#dotnetlint
          .#dn-inspect
          .#helmlint
          .#attic
          .#cliproxyapi
          .#deadcode
          .#coderabbit
          .#ccc
          .#md-mermaid-lint
          .#clickup_cli
          .#inspect
          .#pagerduty_cli
          .#dashboard-linter
          -c bash -c '
          sg --version &&
          upstash --version &&
          action-docs --version
          typescript-json-schema --version &&
          swagger-typescript-api --version &&
          dotnetsay &&
          dotnet-ef --version &&
          mirrord --version &&
          pls --version &&
          toml --version &&
          nix-share &&
          cyanprint --version &&
          wt --version &&
          garden version &&
          codecov --version &&
          dotnetlint --version &&
          dn-inspect --version &&
          deadcode --version &&
          coderabbit --version &&
          ccc --version &&
          md-mermaid-lint --version &&
          cup --version &&
          pd --version &&
          helmlint --version &&
          inspect --help &&
          attic --version &&
          cli-proxy-api --help &&
          dashboard-linter --help &&
          echo "🎉 Done"'

  release:
    name: Semantic Release
    needs:
      - precommit
      - build
    if: github.ref == 'refs/heads/main'
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-nix-registry-releaser-nix-store-cache
      - nscloud-git-mirror-1gb
    steps:
      # Setup
      - uses: AtomiCloud/actions.setup-nix@v3
        with:
          auth-bot-app-id: ${{ vars.AUTH_BOT_APP_ID }}
          auth-bot-secret-key: ${{ secrets.AUTH_BOT_SECRET_KEY }}
      - uses: AtomiCloud/actions.cache-npm@v1

      # action
      - name: Release
        env:
          # needed for releaser
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix develop .#releaser -c scripts/ci/release.sh
